<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>TOEFL Speaking Recorder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ----------------------------------------------------------
     TOEFL Speaking Recorder
     Edit TASKS below to change prep/response seconds per task.
     ---------------------------------------------------------- */
  :root{
    --ink:#1b1714;
    --paper:#f4efe7;
    --paper-2:#ece4d7;
    --crimson:#950E0E;
    --crimson-deep:#6f0a0a;
    --green:#1f7a4d;
    --muted:#7a7066;
    --line:#d8cdbb;
    --shadow:0 18px 40px -22px rgba(40,20,10,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Spline Sans",sans-serif;
    background:
      radial-gradient(120% 80% at 80% -10%, #fbf7f0 0%, transparent 55%),
      radial-gradient(100% 70% at -10% 110%, #efe6d6 0%, transparent 50%),
      var(--paper);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    justify-content:center;
    padding:28px 18px 56px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:520px}

  header{margin-bottom:22px}
  .kicker{
    font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--crimson);font-weight:600;margin:0 0 6px;
  }
  h1{
    font-family:"Fraunces",serif;font-weight:900;font-size:2.1rem;
    line-height:1.04;margin:0 0 8px;letter-spacing:-.01em;
  }
  .sub{color:var(--muted);font-size:.92rem;margin:0}

  .card{
    background:rgba(255,253,249,.7);
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
    box-shadow:var(--shadow);
    backdrop-filter:blur(4px);
    margin-top:18px;
  }
  label.field{display:block;margin-bottom:16px}
  label.field span{
    display:block;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin-bottom:7px;
  }
  input[type=text]{
    width:100%;font:inherit;font-size:1rem;padding:11px 13px;
    border:1px solid var(--line);border-radius:11px;background:#fffdf9;color:var(--ink);
  }
  input[type=text]:focus{outline:2px solid var(--crimson);border-color:transparent}

  .tasks{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:4px}
  .task-btn{
    text-align:left;cursor:pointer;font:inherit;
    border:1px solid var(--line);background:#fffdf9;border-radius:12px;
    padding:11px 13px;transition:.15s;
  }
  .task-btn b{display:block;font-family:"Fraunces",serif;font-weight:600;font-size:1.02rem}
  .task-btn small{color:var(--muted);font-size:.78rem}
  .task-btn[aria-pressed=true]{
    background:var(--crimson);border-color:var(--crimson);color:#fff;
  }
  .task-btn[aria-pressed=true] small{color:#f3d4d4}

  /* Stage */
  .stage{margin-top:18px;text-align:center;display:none}
  .stage.on{display:block}
  .phase{
    font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;
    color:var(--muted);margin-bottom:6px;height:1.1em;
  }
  .phase.prep{color:var(--crimson)}
  .phase.rec{color:var(--green)}
  .clock{
    font-family:"Fraunces",serif;font-weight:900;font-size:4.4rem;line-height:1;
    letter-spacing:-.02em;font-variant-numeric:tabular-nums;
  }
  .bar{height:7px;background:var(--paper-2);border-radius:99px;overflow:hidden;margin:16px 0 4px}
  .bar > i{display:block;height:100%;width:100%;background:var(--crimson);transition:width .25s linear}
  .bar.rec > i{background:var(--green)}
  .dot{
    display:inline-block;width:9px;height:9px;border-radius:50%;
    background:var(--green);margin-right:7px;vertical-align:middle;
    animation:pulse 1s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .btn-row{display:flex;gap:10px;margin-top:18px}
  button.action{
    flex:1;font:inherit;font-weight:600;font-size:1rem;cursor:pointer;
    padding:14px;border-radius:13px;border:0;transition:.15s;
  }
  .primary{background:var(--crimson);color:#fff}
  .primary:hover{background:var(--crimson-deep)}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .ghost:hover{background:#fffdf9}
  button:disabled{opacity:.45;cursor:default}

  .review{display:none;margin-top:18px}
  .review.on{display:block}
  audio{width:100%;margin:6px 0 14px}
  .dl{
    display:block;text-align:center;text-decoration:none;font-weight:600;
    background:var(--green);color:#fff;padding:14px;border-radius:13px;
  }
  .hint{font-size:.84rem;color:var(--muted);margin-top:14px;text-align:center}
  .err{
    background:#fce9e9;border:1px solid #f1c0c0;color:#8a1414;
    padding:12px 14px;border-radius:11px;font-size:.88rem;margin-top:14px;display:none;
  }
  .err.on{display:block}
  footer{margin-top:26px;text-align:center;color:var(--muted);font-size:.76rem}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="kicker">Speaking Practice</p>
    <h1>TOEFL&nbsp;Speaking Recorder</h1>
    <p class="sub">Record under real test timing, play it back, then download and upload your file to the practice form.</p>
  </header>

  <!-- SETUP -->
  <section class="card" id="setup">
    <label class="field">
      <span>Your name or email</span>
      <input type="text" id="student" placeholder="e.g. yuki.tanaka@example.com" autocomplete="off">
    </label>
    <label class="field" style="margin-bottom:10px">
      <span>Choose a task</span>
    </label>
    <div class="tasks" id="tasks"></div>
    <div class="err" id="err"></div>
    <div class="btn-row">
      <button class="action primary" id="start">Start task</button>
    </div>
  </section>

  <!-- STAGE -->
  <section class="stage" id="stage">
    <div class="phase" id="phase">&nbsp;</div>
    <div class="clock" id="clock">0:00</div>
    <div class="bar" id="bar"><i id="fill"></i></div>
    <div class="btn-row">
      <button class="action ghost" id="skip">Skip to speaking</button>
      <button class="action primary" id="stopBtn">Stop &amp; finish</button>
    </div>
  </section>

  <!-- REVIEW -->
  <section class="review" id="review">
    <div class="card">
      <audio id="player" controls></audio>
      <a class="dl" id="download" download>⬇ Download recording</a>
      <p class="hint" id="dlhint"></p>
      <div class="btn-row">
        <button class="action ghost" id="redo">Record again</button>
      </div>
    </div>
  </section>

  <footer>Tip: on a phone, allow the microphone when asked. Works in Chrome and Safari.</footer>
</div>

<script>
/* ===== Task config — edit the numbers to change timing (seconds) ===== */
const TASKS = {
  1:{label:"Task 1 · Independent", prep:15, speak:45},
  2:{label:"Task 2 · Integrated",  prep:30, speak:60},
  3:{label:"Task 3 · Integrated",  prep:30, speak:60},
  4:{label:"Task 4 · Integrated",  prep:20, speak:60},
};

const $ = id => document.getElementById(id);
let selected = 1, mediaStream=null, recorder=null, chunks=[], ticker=null, blobUrl=null, mime="";

/* Build task buttons */
const taskWrap = $("tasks");
Object.entries(TASKS).forEach(([n,t])=>{
  const b=document.createElement("button");
  b.className="task-btn"; b.type="button";
  b.setAttribute("aria-pressed", n==="1");
  b.innerHTML=`<b>Task ${n}</b><small>${t.prep}s prep · ${t.speak}s speak</small>`;
  b.onclick=()=>{ selected=+n; [...taskWrap.children].forEach(c=>c.setAttribute("aria-pressed","false")); b.setAttribute("aria-pressed","true"); };
  taskWrap.appendChild(b);
});

function showErr(msg){ const e=$("err"); e.textContent=msg; e.classList.add("on"); }
function clearErr(){ $("err").classList.remove("on"); }
function fmt(s){ const m=Math.floor(s/60); const r=s%60; return m+":"+String(r).padStart(2,"0"); }
function pickMime(){
  const opts=["audio/webm","audio/mp4","audio/ogg"];
  for(const o of opts){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(o)) return o; }
  return "";
}
function extFor(m){ if(m.includes("mp4"))return"m4a"; if(m.includes("ogg"))return"ogg"; return"webm"; }
function safeName(s){ return (s||"student").trim().replace(/[^\w.@-]+/g,"_").slice(0,40) || "student"; }

/* ---- Start: get mic, run prep timer, then record ---- */
$("start").onclick = async () => {
  clearErr();
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showErr("This browser can't access the microphone. Try Chrome or Safari, and make sure the page address starts with https://"); return;
  }
  $("start").disabled = true;
  try{
    mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){
    $("start").disabled = false;
    if(e.name==="NotAllowedError") showErr("Microphone permission was blocked. Tap the lock/⋮ icon in the address bar, allow the microphone, then try again.");
    else if(e.name==="NotFoundError") showErr("No microphone was found on this device.");
    else showErr("Couldn't start the microphone: "+e.name);
    return;
  }
  $("setup").style.display="none";
  $("stage").classList.add("on");
  runPrep();
};

function runPrep(){
  const t=TASKS[selected];
  if(t.prep<=0){ startRecording(); return; }
  let left=t.prep;
  $("phase").textContent="Preparation"; $("phase").className="phase prep";
  $("bar").classList.remove("rec");
  $("skip").style.display=""; $("stopBtn").style.display="none";
  $("clock").textContent=fmt(left);
  $("fill").style.background="";
  $("fill").style.width="100%";
  clearInterval(ticker);
  ticker=setInterval(()=>{
    left--;
    $("clock").textContent=fmt(Math.max(left,0));
    $("fill").style.width=(left/t.prep*100)+"%";
    if(left<=0){ clearInterval(ticker); startRecording(); }
  },1000);
}

$("skip").onclick=()=>{ clearInterval(ticker); startRecording(); };

function startRecording(){
  const t=TASKS[selected];
  mime=pickMime();
  chunks=[];
  recorder = mime ? new MediaRecorder(mediaStream,{mimeType:mime}) : new MediaRecorder(mediaStream);
  recorder.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
  recorder.onstop=finish;
  recorder.start();

  let left=t.speak;
  $("phase").innerHTML='<span class="dot"></span>Recording'; $("phase").className="phase rec";
  $("bar").classList.add("rec");
  $("skip").style.display="none"; $("stopBtn").style.display="";
  $("clock").textContent=fmt(left);
  $("fill").style.width="100%";
  clearInterval(ticker);
  ticker=setInterval(()=>{
    left--;
    $("clock").textContent=fmt(Math.max(left,0));
    $("fill").style.width=(left/t.speak*100)+"%";
    if(left<=0){ clearInterval(ticker); if(recorder.state!=="inactive") recorder.stop(); }
  },1000);
}

$("stopBtn").onclick=()=>{ clearInterval(ticker); if(recorder&&recorder.state!=="inactive") recorder.stop(); };

function finish(){
  mediaStream.getTracks().forEach(t=>t.stop());
  const blob=new Blob(chunks,{type: recorder.mimeType||mime||"audio/webm"});
  if(blobUrl) URL.revokeObjectURL(blobUrl);
  blobUrl=URL.createObjectURL(blob);

  const ext=extFor(blob.type||mime);
  const date=new Date().toISOString().slice(0,10);
  const fname=`${safeName($("student").value)}_TOEFL_Speaking_Task${selected}_${date}.${ext}`;

  $("player").src=blobUrl;
  const dl=$("download"); dl.href=blobUrl; dl.setAttribute("download",fname);
  $("dlhint").textContent="Saved as "+fname+" — upload this file to the practice form.";

  $("stage").classList.remove("on");
  $("review").classList.add("on");
  if(blob.size<1500) showErr("That recording is very small — the mic may have been muted. Try again.");
}

$("redo").onclick=()=>{
  $("review").classList.remove("on");
  clearErr();
  $("setup").style.display="";
  $("start").disabled=false;
};
</script>
</body>
</html>
